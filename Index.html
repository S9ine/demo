<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการสมาคมสุสาน</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .sidebar-transition { transition: width 0.3s ease; }
        
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { position: absolute; left: 0; top: 0; width: 100%; background: white; }
            .no-print { display: none !important; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const INITIAL_ORG_INFO = {
            name: "สมาคมสุสานพุทธสมาคมบ้านหมี่",
            address: "123 หมู่ 4 ต.บ้านหมี่ อ.บ้านหมี่ จ.ลพบุรี 15110",
            taxId: "0105560000000",
            bankName: "กสิกรไทย",
            bankAccountNo: "123-4-56789-0",
            bankAccountName: "สมาคมสุสานฯ"
        };

        const INITIAL_PLOT_TYPES = [
            { id: 1, name: "หลุมเดี่ยว", price: 35000 },
            { id: 2, name: "หลุมคู่", price: 65000 },
            { id: 3, name: "หลุมครอบครัว", price: 150000 }
        ];

        // --- Helper Components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const ToastNotification = ({ id, message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(() => onClose(id), 3000);
                return () => clearTimeout(timer);
            }, [id, onClose]);

            const colors = { success: "bg-green-600", error: "bg-red-600", info: "bg-blue-600", warning: "bg-yellow-600" };
            return (
                <div className={`${colors[type]} text-white px-5 py-3 rounded-lg shadow-lg flex items-center justify-between min-w-[280px] mb-3 animate-in slide-in-from-right-8 fade-in duration-300 pointer-events-auto`}>
                    <div className="flex items-center space-x-2">
                        <Icon name={type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : type === 'warning' ? 'alert-triangle' : 'info'} size={18} />
                        <span className="text-sm font-medium">{message}</span>
                    </div>
                    <button onClick={() => onClose(id)} className="ml-4 hover:bg-white/20 p-1 rounded transition-colors">
                        <Icon name="x" size={14} />
                    </button>
                </div>
            );
        };

        function App() {
            // State สำหรับระบบ Login & Session
            const [sessionChecking, setSessionChecking] = useState(true);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState(null);
            
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
            const [activeMenu, setActiveMenu] = useState('dashboard');
            const [showModal, setShowModal] = useState(null);
            
            // UI States
            const [toasts, setToasts] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [dataLoaded, setDataLoaded] = useState(false);

            // Data States
            const [orgInfo, setOrgInfo] = useState(INITIAL_ORG_INFO);
            const [members, setMembers] = useState([]);
            const [plots, setPlots] = useState([]);
            const [payments, setPayments] = useState([]);

            // --- Utilities ---
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };
            const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

            const runGAS = (funcName, ...args) => {
                return new Promise((resolve, reject) => {
                    if (typeof google !== 'undefined' && google.script && google.script.run) {
                        google.script.run
                            .withSuccessHandler(resolve).withFailureHandler(reject)[funcName](...args);
                    } else {
                        // หากไม่ได้รันบน GAS จะส่งค่าพิเศษกลับไปเพื่อใช้งานโหมดจำลอง (Mock)
                        resolve({ _mockEnv: true, funcName, args });
                    }
                });
            };

            // --- ตรวจสอบ Session ตอนโหลดหน้าเว็บครั้งแรก ---
            useEffect(() => {
                const checkSession = async () => {
                    const token = localStorage.getItem('cms_session_token');
                    if (token) {
                        try {
                            const res = await runGAS('validateSession', token);
                            if (res && res._mockEnv) {
                                setUser({ name: 'ผู้ดูแลระบบ (โหมดทดสอบ)' });
                                setIsLoggedIn(true);
                                addToast('โหมดทดสอบ: คืนค่าเซสชันสำเร็จ', 'warning');
                            } else if (res && res.valid) {
                                setUser(res.user);
                                setIsLoggedIn(true);
                            } else {
                                localStorage.removeItem('cms_session_token');
                            }
                        } catch (err) {
                            console.error(err);
                            localStorage.removeItem('cms_session_token');
                        }
                    }
                    setSessionChecking(false);
                };
                checkSession();
            }, []);

            // --- ดึงข้อมูลหลัง Login สำเร็จ ---
            useEffect(() => {
                if (isLoggedIn && !dataLoaded && !sessionChecking) {
                    setLoading(true);
                    runGAS('getInitialData')
                        .then(data => {
                            if (data && data._mockEnv) {
                                setMembers([{ id: 'M-001', name: 'สมชาย ใจดี (Mock)', cid: '1234567890123', phone: '081-222-3333', address: { no: '1/1', sub: 'บ้านหมี่', dist: 'บ้านหมี่', prov: 'ลพบุรี', zip: '15110' } }]);
                                setPlots([{ id: 'P-A01', type: 'หลุมเดี่ยว', row: 1, col: 1, status: 'occupied', relativeId: 'M-001', deceasedName: 'สมใจ ใจดี (Mock)', deathDate: '2023-10-10', expiryDate: '2053-10-10', autoRenew: false, image: null }]);
                            } else if (data) {
                                if (data.members) setMembers(data.members);
                                if (data.plots) setPlots(data.plots);
                                if (data.payments) setPayments(data.payments);
                                addToast('โหลดข้อมูลสำเร็จ', 'success');
                            }
                            setDataLoaded(true);
                            setLoading(false);
                        })
                        .catch(err => {
                            console.error("Error fetching initial data:", err);
                            addToast('เกิดข้อผิดพลาดในการโหลดข้อมูล', 'error');
                            setDataLoaded(true);
                            setLoading(false);
                        });
                }
            }, [isLoggedIn, dataLoaded, sessionChecking]);

            const resizeImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            if (w > 800) { h *= 800 / w; w = 800; }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', 0.7));
                        };
                    };
                });
            };

            // --- ฟังก์ชันเข้าสู่ระบบ ---
            const handleLogin = async (e) => {
                e.preventDefault();
                const username = e.target.username.value.trim();
                const password = e.target.password.value.trim();
                
                setLoading(true);
                try {
                    const res = await runGAS('loginUser', username, password);
                    
                    if (res && res._mockEnv) {
                        if (username === 'admin' && password === '1234') {
                            localStorage.setItem('cms_session_token', 'mock_token_12345');
                            setUser({ name: 'Administrator (Mock)' });
                            setIsLoggedIn(true);
                            addToast('เข้าสู่ระบบสำเร็จ (โหมดจำลอง)', 'success');
                        } else {
                            addToast('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง (ลอง admin / 1234)', 'error');
                        }
                    } else if (res && res.success) {
                        localStorage.setItem('cms_session_token', res.token);
                        setUser(res.user);
                        setIsLoggedIn(true);
                        addToast(`ยินดีต้อนรับคุณ ${res.user.name}`, 'success');
                    } else {
                        addToast(res.message || 'รหัสไม่ถูกต้อง (หากเพิ่งติดตั้ง กรุณารัน setupDatabase ใน GAS ก่อน)', 'error');
                    }
                } catch(err) {
                    console.error(err);
                    addToast('เกิดข้อผิดพลาดในการเชื่อมต่อระบบ', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = async () => {
                const token = localStorage.getItem('cms_session_token');
                setLoading(true);
                if (token) {
                    try { await runGAS('logoutUser', token); } catch(e) { console.error(e); }
                }
                localStorage.removeItem('cms_session_token');
                setIsLoggedIn(false);
                setUser(null);
                setDataLoaded(false);
                setLoading(false);
                addToast('ออกจากระบบสำเร็จ', 'info');
            };

            // --- CRUD Operations ---
            const handleAddMember = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = {
                    name: formData.get('name'), cid: formData.get('cid'), phone: formData.get('phone'),
                    address: { no: formData.get('no'), sub: formData.get('sub'), dist: formData.get('dist'), prov: formData.get('prov'), zip: formData.get('zip') }
                };
                setLoading(true);
                try {
                    const newId = `M-${String(members.length + 1).padStart(3, '0')}`;
                    const newMember = { ...data, id: newId };
                    const res = await runGAS('saveMember', newMember);
                    setMembers(prev => [...prev, newMember]);
                    setShowModal(null);
                    addToast('บันทึกข้อมูลสมาชิกสำเร็จ');
                } catch(err) { addToast('เกิดข้อผิดพลาดในการบันทึก', 'error'); } 
                finally { setLoading(false); }
            };

            const handleUpdatePlot = async (e, r, c, previewImage) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const plotData = {
                    row: r, col: c,
                    type: formData.get('type'), relativeId: formData.get('relativeId'),
                    deceasedName: formData.get('deceasedName'), deathDate: formData.get('deathDate'),
                    expiryDate: formData.get('expiryDate'), autoRenew: formData.get('autoRenew') === 'on',
                    image: previewImage
                };
                setLoading(true);
                try {
                    const plotId = plots.find(p => p.row === r && p.col === c)?.id || `P-${String.fromCharCode(64 + r)}${String(c).padStart(2, '0')}`;
                    const newPlot = { ...plotData, id: plotId, status: 'occupied' };
                    await runGAS('savePlot', newPlot);
                    setPlots(prev => {
                        const idx = prev.findIndex(p => p.row === r && p.col === c);
                        if (idx > -1) { const arr = [...prev]; arr[idx] = newPlot; return arr; }
                        return [...prev, newPlot];
                    });
                    setShowModal(null);
                    addToast('บันทึกข้อมูลพื้นที่สำเร็จ');
                } catch(err) { addToast('เกิดข้อผิดพลาดในการบันทึก', 'error'); } 
                finally { setLoading(false); }
            };

            const handleAddPayment = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = {
                    id: `REC-${Date.now().toString().slice(-6)}`,
                    date: new Date().toLocaleDateString('th-TH'),
                    memberId: formData.get('memberId'), plotId: formData.get('plotId'),
                    amount: formData.get('amount'), type: formData.get('feeType'),
                    year: formData.get('year'), note: formData.get('note')
                };
                setLoading(true);
                try {
                    await runGAS('savePayment', data);
                    setPayments(prev => [data, ...prev]);
                    setShowModal(null);
                    addToast('บันทึกการรับเงินสำเร็จ');
                } catch(err) { addToast('เกิดข้อผิดพลาดในการบันทึก', 'error'); } 
                finally { setLoading(false); }
            };

            // --- Views ---
            const DashboardView = () => {
                const stats = [
                    { label: 'สมาชิกทั้งหมด', value: members.length, color: 'blue', icon: 'users' },
                    { label: 'พื้นที่ว่าง', value: 100 - plots.filter(p=>p.status==='occupied').length, color: 'green', icon: 'layout' },
                    { label: 'พื้นที่ใช้งานแล้ว', value: plots.filter(p=>p.status==='occupied').length, color: 'orange', icon: 'check-square' },
                    { label: 'รายรับรวม', value: payments.reduce((acc, curr) => acc + Number(curr.amount), 0).toLocaleString(), color: 'purple', icon: 'dollar-sign' },
                ];
                const expiringPlots = plots.filter(p => p.expiryDate && !p.autoRenew && new Date(p.expiryDate) <= new Date(new Date().setFullYear(new Date().getFullYear() + 1)));

                return (
                    <div className="space-y-6 animate-in fade-in">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            {stats.map((s, i) => (
                                <div key={i} className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                    <div className={`p-3 bg-${s.color}-100 text-${s.color}-600 rounded-lg`}><Icon name={s.icon} /></div>
                                    <div><p className="text-sm text-slate-500">{s.label}</p><p className="text-2xl font-bold text-slate-800">{s.value}</p></div>
                                </div>
                            ))}
                        </div>
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-4 border-b border-slate-100 bg-slate-50 flex items-center">
                                <Icon name="alert-triangle" size={18} className="mr-2 text-orange-500" />
                                <h3 className="font-semibold text-slate-800">แจ้งเตือนพื้นที่ใกล้หมดอายุ (ภายใน 1 ปี)</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 text-slate-600 uppercase text-xs">
                                        <tr><th className="px-6 py-3">รหัสหลุม</th><th className="px-6 py-3">เจ้าของ/ญาติ</th><th className="px-6 py-3">ผู้วายชนม์</th><th className="px-6 py-3 text-orange-600">วันหมดอายุ</th><th className="px-6 py-3">สถานะ</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {expiringPlots.length > 0 ? expiringPlots.map(p => (
                                            <tr key={p.id}>
                                                <td className="px-6 py-4 font-medium">{p.id}</td><td className="px-6 py-4">{members.find(m => m.id === p.relativeId)?.name}</td><td className="px-6 py-4">{p.deceasedName}</td><td className="px-6 py-4 text-orange-600 font-bold">{p.expiryDate}</td>
                                                <td className="px-6 py-4"><span className="px-2 py-1 bg-orange-100 text-orange-600 rounded-full text-xs">ใกล้หมดอายุ</span></td>
                                            </tr>
                                        )) : <tr><td colSpan="5" className="px-6 py-10 text-center text-slate-400">ไม่พบรายการใกล้หมดอายุ</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const MembersView = () => {
                const [tab, setTab] = useState('relatives');
                const filteredMembers = members.filter(m => m.name.includes(searchTerm) || m.id.includes(searchTerm));
                return (
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 animate-in fade-in">
                        <div className="p-4 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex space-x-1 bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => setTab('relatives')} className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${tab === 'relatives' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>ญาติ/ผู้ติดต่อ</button>
                                <button onClick={() => setTab('deceased')} className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${tab === 'deceased' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>ทะเบียนผู้วายชนม์</button>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="relative">
                                    <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="ค้นหา..." className="pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full md:w-64" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                <button onClick={() => setShowModal('member')} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm flex items-center hover:bg-blue-700">
                                    <Icon name="plus" size={16} className="mr-1" /> เพิ่ม
                                </button>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            {tab === 'relatives' ? (
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 text-slate-600 uppercase text-xs">
                                        <tr><th className="px-6 py-3">รหัส</th><th className="px-6 py-3">ชื่อ-นามสกุล</th><th className="px-6 py-3">เบอร์โทรศัพท์</th><th className="px-6 py-3">ที่อยู่</th><th className="px-6 py-3">จัดการ</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredMembers.map(m => (
                                            <tr key={m.id} className="hover:bg-slate-50">
                                                <td className="px-6 py-4 font-medium">{m.id}</td><td className="px-6 py-4 font-semibold">{m.name}</td><td className="px-6 py-4">{m.phone}</td><td className="px-6 py-4 text-xs text-slate-500">{`${m.address.no} ต.${m.address.sub} อ.${m.address.dist} จ.${m.address.prov}`}</td>
                                                <td className="px-6 py-4"><div className="flex space-x-2"><button className="p-1 hover:text-blue-600"><Icon name="edit" size={16}/></button><button onClick={()=>{setMembers(members.filter(x=>x.id!==m.id)); addToast('ลบสำเร็จ','info');}} className="p-1 hover:text-red-600"><Icon name="trash" size={16}/></button></div></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            ) : (
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 text-slate-600 uppercase text-xs">
                                        <tr><th className="px-6 py-3">ผู้วายชนม์</th><th className="px-6 py-3">วันที่เสียชีวิต</th><th className="px-6 py-3">รหัสหลุม</th><th className="px-6 py-3">ญาติผู้ดูแล</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {plots.filter(p => p.status === 'occupied').map(p => (
                                            <tr key={p.id}><td className="px-6 py-4 font-bold">{p.deceasedName}</td><td className="px-6 py-4">{p.deathDate}</td><td className="px-6 py-4"><span className="bg-slate-100 px-2 py-1 rounded">{p.id}</span></td><td className="px-6 py-4 font-medium">{members.find(m => m.id === p.relativeId)?.name}</td></tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                );
            };

            const PlotsView = () => {
                const [viewMode, setViewMode] = useState('grid');
                return (
                    <div className="space-y-4 animate-in fade-in">
                        <div className="flex items-center justify-between">
                            <h2 className="text-xl font-bold text-slate-800">จัดการพื้นที่และแผนผัง</h2>
                            <div className="flex space-x-2 bg-white p-1 rounded-lg border border-slate-200">
                                <button onClick={() => setViewMode('list')} className={`p-2 rounded ${viewMode === 'list' ? 'bg-blue-100 text-blue-600' : 'text-slate-400'}`}><Icon name="list" size={18}/></button>
                                <button onClick={() => setViewMode('grid')} className={`p-2 rounded ${viewMode === 'grid' ? 'bg-blue-100 text-blue-600' : 'text-slate-400'}`}><Icon name="grid" size={18}/></button>
                            </div>
                        </div>

                        {viewMode === 'list' ? (
                            <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {plots.map(p => (
                                    <div key={p.id} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                                        <div className="flex justify-between items-start">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${p.status === 'occupied' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}`}>{p.status === 'occupied' ? 'มีเจ้าของ' : 'ว่าง'}</span>
                                            <span className="text-slate-400 text-xs">{p.id}</span>
                                        </div>
                                        <h4 className="font-bold text-slate-800">{p.deceasedName || 'ยังไม่มีข้อมูล'}</h4>

                                    <Icon name="home" size={32} className="text-white" />
                                </div>
                                <h1 className="text-2xl font-black text-slate-800 uppercase tracking-tight">CEMETERY CMS</h1>
                                <p className="text-slate-500 text-sm font-medium">ระบบบริหารจัดการสมาคมสุสาน</p>
                            </div>
                            <form className="p-8 space-y-4" onSubmit={handleLogin}>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Username</label>
                                    <div className="relative">
                                        <Icon name="user" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input name="username" type="text" required className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="กรอกชื่อผู้ใช้..." />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Password</label>
                                    <div className="relative">
                                        <Icon name="lock" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input name="password" type="password" required className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="กรอกรหัสผ่าน..." />
                                    </div>
                                </div>
                                <button type="submit" disabled={loading} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-100 transform active:scale-95 transition-all disabled:opacity-50">
                                    {loading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ'}
                                </button>
                                <p className="text-center text-[10px] text-slate-400 uppercase tracking-widest pt-4">© 2024 CMS v1.0.0</p>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex bg-slate-50 no-print">
                    {loading && (
                        <div className="fixed inset-0 z-[9999] bg-white/60 backdrop-blur-sm flex items-center justify-center">
                            <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin shadow-lg"></div>
                        </div>
                    )}

                    <div className="fixed top-6 right-6 z-[9999] flex flex-col items-end pointer-events-none">
                        {toasts.map(t => <ToastNotification key={t.id} {...t} onClose={removeToast} />)}
                    </div>

                    <aside className={`bg-slate-900 text-slate-300 sidebar-transition flex flex-col ${sidebarCollapsed ? 'w-20' : 'w-72'}`}>
                        <div className="p-6 flex items-center space-x-4 border-b border-slate-800 overflow-hidden">
                            <div className="min-w-[40px] h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white text-xl">C</div>
                            {!sidebarCollapsed && <span className="font-black text-white text-lg tracking-tighter uppercase whitespace-nowrap">Cemetery Admin</span>}
                        </div>
                        
                        <nav className="flex-1 py-6 space-y-1 px-3">
                            {[
                                { id: 'dashboard', label: 'ภาพรวม', icon: 'layout-dashboard' },
                                { id: 'members', label: 'ฐานข้อมูลสมาชิก', icon: 'users' },
                                { id: 'plots', label: 'จัดการพื้นที่', icon: 'map' },
                                { id: 'payments', label: 'การเงิน/ใบเสร็จ', icon: 'credit-card' },
                                { id: 'settings', label: 'ตั้งค่าระบบ', icon: 'settings' },
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveMenu(item.id)}
                                    className={`w-full flex items-center px-4 py-3 rounded-xl transition-all group ${activeMenu === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/40' : 'hover:bg-slate-800'}`}
                                >
                                    <Icon name={item.icon} size={20} className={activeMenu === item.id ? 'text-white' : 'text-slate-500 group-hover:text-white'} />
                                    {!sidebarCollapsed && <span className="ml-4 font-medium">{item.label}</span>}
                                </button>
                            ))}
                        </nav>

                        <div className="p-4 border-t border-slate-800">
                            <button onClick={handleLogout} className="w-full flex items-center px-4 py-3 rounded-xl hover:bg-red-900/20 text-slate-500 hover:text-red-400 transition-all overflow-hidden group">
                                <Icon name="log-out" size={20} />
                                {!sidebarCollapsed && <span className="ml-4 font-medium whitespace-nowrap">ออกจากระบบ</span>}
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0">
                        <header className="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-40">
                            <button onClick={() => setSidebarCollapsed(!sidebarCollapsed)} className="p-2 hover:bg-slate-50 rounded-lg border border-slate-100 text-slate-400">
                                <Icon name={sidebarCollapsed ? "menu" : "chevron-left"} />
                            </button>
                            <div className="flex items-center space-x-4">
                                <div className="text-right">
                                    <p className="text-sm font-bold text-slate-800">{user?.name}</p>
                                    <p className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Administrator</p>
                                </div>
                                <div className="w-10 h-10 bg-slate-100 rounded-full border-2 border-white shadow-sm flex items-center justify-center overflow-hidden">
                                    <Icon name="user" className="text-slate-400" />
                                </div>
                            </div>
                        </header>

                        <div className="p-8 max-w-[1400px] mx-auto w-full">
                            {activeMenu === 'dashboard' && <DashboardView />}
                            {activeMenu === 'members' && <MembersView />}
                            {activeMenu === 'plots' && <PlotsView />}
                            {activeMenu === 'payments' && <PaymentsView />}
                            {activeMenu === 'settings' && <SettingsView />}
                        </div>
                    </main>

                    {showModal === 'member' && <MemberModal />}
                    {showModal?.type === 'plot' && <PlotModal />}
                    {showModal === 'payment' && <PaymentModal />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
